<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard ติดตามงาน - ฝ่ายโรงงานผลิตน้ำมหาสวัสดิ์</title>
    
    <!-- Libraries -->
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)"></script>
    <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)"></script>
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
    <script src="[https://unpkg.com/recharts/umd/Recharts.js](https://unpkg.com/recharts/umd/Recharts.js)"></script>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js](https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js)"></script>
    <link href="[https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap](https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap)" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-row-enter { transition: all 0.2s ease; }
        .table-row-enter:hover { transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts;

        // Icons Component
        const Icons = {
            Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>,
            Alert: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>,
            Check: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Money: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Refresh: () => <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>,
            Task: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>,
            File: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        };

        // Utility Functions
        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount);
        };

        const parseNumber = (str) => {
            if (!str) return 0;
            const cleanStr = String(str).replace(/,/g, '').replace(/[฿$]/g, '').trim();
            const num = parseFloat(cleanStr);
            return isNaN(num) ? 0 : num;
        };

        const App = () => {
            const [data, setData] = useState([]);
            const [headers, setHeaders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [lastUpdated, setLastUpdated] = useState(null);
            const [selectedSheet, setSelectedSheet] = useState('งบทำการ-2570');

            // รายการ Sheet ที่มี
            const sheets = [
                { id: 'งบทำการ-2570', gid: '840130635', name: 'งบทำการ 2570' },
                { id: 'งบลงทุน-2570', gid: '502447192', name: 'งบลงทุน 2570' },
                { id: 'งบทำการ-2569', gid: '2139626490', name: 'งบทำการ 2569' },
                { id: 'งบลงทุน-2569', gid: '383637175', name: 'งบลงทุน 2569' }
            ];

            // Google Sheet ID หลัก
            const sheetId = '1JJT9T9OsSSpzzT3HlwgTbBkKzmmqSFRTcLw--fHrT_o';
            
            const fetchData = (sheetGid) => {
                setLoading(true);
                setError(null);
                
                // ใช้ GID เพื่อเจาะจง Sheet ที่ต้องการดึงข้อมูล
                const targetGid = sheetGid || sheets.find(s => s.id === selectedSheet).gid;
                const exportUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${targetGid}`;

                Papa.parse(exportUrl, {
                    download: true,
                    header: false,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const rawData = results.data;
                        if (rawData.length === 0) {
                            setError("ไม่พบข้อมูลใน Sheet");
                            setLoading(false);
                            return;
                        }

                        // ค้นหาบรรทัดที่เป็น Header
                        let headerIdx = rawData.findIndex(row => 
                            row.some(cell => String(cell).includes('สถานะ') || String(cell).includes('ลำดับที่') || String(cell).includes('รายการ'))
                        );

                        if (headerIdx === -1) headerIdx = 0;

                        // ลบเว้นวรรคและขึ้นบรรทัดใหม่ในชื่อคอลัมน์
                        const extractedHeaders = rawData[headerIdx].map(h => h ? String(h).trim().replace(/\n/g, ' ') : '');
                        
                        // แปลงข้อมูลแถวที่เหลือเป็น Object
                        const validData = rawData.slice(headerIdx + 1)
                            .filter(row => row.length > 0 && row.some(cell => cell !== null && cell.trim() !== ''))
                            .map(row => {
                                let obj = {};
                                extractedHeaders.forEach((h, i) => {
                                    if (h) obj[h] = row[i];
                                });
                                return obj;
                            });
                        
                        setData(validData);
                        setHeaders(extractedHeaders.filter(h => h !== ''));
                        setLastUpdated(new Date());
                        setLoading(false);
                    },
                    error: (err) => {
                        console.error("Error fetching sheet:", err);
                        setError("ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบว่า Sheet ได้เปิดแชร์สาธารณะ (Anyone with the link can view) แล้ว หรือลิงก์อาจไม่ถูกต้อง");
                        setLoading(false);
                    }
                });
            };

            useEffect(() => {
                const sheetInfo = sheets.find(s => s.id === selectedSheet);
                if(sheetInfo) {
                    fetchData(sheetInfo.gid);
                }
            }, [selectedSheet]);

            // Identify Key Columns
            const statusCol = useMemo(() => headers.find(h => h.includes('สถานะ')), [headers]);
            const budgetCol = useMemo(() => headers.find(h => h.includes('วงเงินดำเนินการ') || h.includes('รวม VAT')), [headers]);
            const itemCol = useMemo(() => headers.find(h => h.includes('รายการ')), [headers]);
            const deptCol = useMemo(() => headers.find(h => h.includes('หน่วยงาน')), [headers]);
            const endDateCol = useMemo(() => headers.find(h => h.includes('สิ้นสุดสัญญา')), [headers]);

            // Filter Data
            const filteredData = useMemo(() => {
                return data.filter(item => {
                    if (!searchTerm) return true;
                    return Object.values(item).some(val => 
                        String(val).toLowerCase().includes(searchTerm.toLowerCase())
                    );
                });
            }, [data, searchTerm]);

            // Calculate Summaries
            const summary = useMemo(() => {
                let totalBudget = 0;
                let completed = 0;
                let delayed = 0;
                let inProgress = 0;

                filteredData.forEach(item => {
                    if (budgetCol && item[budgetCol]) {
                        totalBudget += parseNumber(item[budgetCol]);
                    }

                    if (statusCol && item[statusCol]) {
                        const status = String(item[statusCol]);
                        if (status.includes('เสร็จ') || status.includes('Complete') || status.includes('ลงนามสัญญาแล้ว')) {
                            completed++;
                        } else if (status.includes('ล่าช้า') || status.includes('ปัญหา') || status.includes('ยกเลิก')) {
                            delayed++;
                        } else {
                            inProgress++;
                        }
                    }
                });

                return { total: filteredData.length, totalBudget, completed, delayed, inProgress };
            }, [filteredData, statusCol, budgetCol]);

            // Prepare Chart Data
            const statusChartData = useMemo(() => {
                return [
                    { name: 'ดำเนินการเสร็จ/ลงนามแล้ว', value: summary.completed, color: '#10b981' },
                    { name: 'อยู่ระหว่างดำเนินการ', value: summary.inProgress, color: '#3b82f6' },
                    { name: 'ล่าช้า/มีปัญหา/ยกเลิก', value: summary.delayed, color: '#ef4444' }
                ].filter(d => d.value > 0);
            }, [summary]);

            const deptChartData = useMemo(() => {
                if (!deptCol || !budgetCol) return [];
                const grouped = filteredData.reduce((acc, item) => {
                    let dept = item[deptCol] || 'ไม่ระบุ';
                    dept = dept.split(' ')[0]; 
                    const budget = parseNumber(item[budgetCol]);
                    if (budget > 0) {
                        acc[dept] = (acc[dept] || 0) + budget;
                    }
                    return acc;
                }, {});
                return Object.keys(grouped)
                    .map(key => ({ name: key, value: grouped[key] }))
                    .sort((a, b) => b.value - a.value)
                    .slice(0, 5);
            }, [filteredData, deptCol, budgetCol]);

            return (
                <div className="min-h-screen p-4 md:p-6 max-w-7xl mx-auto">
                    {/* Header Section */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-800 tracking-tight">ระบบติดตามงบประมาณ</h1>
                            <p className="text-slate-500 mt-1 flex items-center">
                                <span className="w-2 h-2 rounded-full bg-blue-500 mr-2"></span>
                                ฝ่ายโรงงานผลิตน้ำมหาสวัสดิ์
                            </p>
                        </div>
                        <div className="flex flex-col items-end gap-3 w-full md:w-auto">
                             <div className="flex bg-white rounded-lg p-1 border border-slate-200 shadow-sm w-full overflow-x-auto">
                                {sheets.map(sheet => (
                                    <button
                                        key={sheet.id}
                                        onClick={() => setSelectedSheet(sheet.id)}
                                        className={`flex-1 flex items-center justify-center px-4 py-2 text-sm font-medium rounded-md transition-colors whitespace-nowrap ${
                                            selectedSheet === sheet.id 
                                                ? 'bg-blue-50 text-blue-700' 
                                                : 'text-slate-500 hover:text-slate-700 hover:bg-slate-50'
                                        }`}
                                    >
                                        <Icons.File /> <span className="ml-2 hidden sm:inline">{sheet.name}</span>
                                        <span className="ml-2 sm:hidden">{sheet.name.replace('งบ', '')}</span>
                                    </button>
                                ))}
                            </div>
                            
                            <div className="flex items-center justify-between w-full">
                                {lastUpdated && (
                                    <span className="text-xs text-slate-400">
                                        อัปเดตเมื่อ: {lastUpdated.toLocaleTimeString('th-TH')}
                                    </span>
                                )}
                                <button 
                                    onClick={() => fetchData()}
                                    className="flex items-center px-3 py-1.5 bg-slate-100 text-slate-600 rounded-md hover:bg-slate-200 transition-colors text-xs font-medium ml-auto"
                                    disabled={loading}
                                >
                                    <Icons.Refresh /> โหลดข้อมูลใหม่
                                </button>
                            </div>
                        </div>
                    </div>

                    {loading ? (
                        <div className="flex flex-col items-center justify-center py-20 bg-white rounded-xl shadow-sm border border-slate-100">
                            <div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
                            <h2 className="mt-4 text-lg font-medium text-slate-700">กำลังดึงข้อมูล...</h2>
                            <p className="text-slate-500 mt-1 text-sm">จาก Sheet {sheets.find(s => s.id === selectedSheet)?.name}</p>
                        </div>
                    ) : error ? (
                        <div className="p-6 bg-red-50 border border-red-200 text-red-700 rounded-xl flex items-start flex-col gap-3">
                            <div className="flex items-center">
                                <Icons.Alert />
                                <span className="ml-3 font-semibold text-lg">เกิดข้อผิดพลาดในการดึงข้อมูล</span>
                            </div>
                            <p className="text-sm ml-9">{error}</p>
                             <button 
                                onClick={() => fetchData()}
                                className="ml-9 px-4 py-2 bg-red-100 text-red-700 rounded-md hover:bg-red-200 transition-colors text-sm font-medium"
                            >
                                ลองใหม่อีกครั้ง
                            </button>
                        </div>
                    ) : (
                        <>
                            {/* Summary Widgets */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                                <div className="bg-white rounded-xl p-5 shadow-sm border border-slate-100 flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium text-slate-500 mb-1">จำนวนงานทั้งหมด</p>
                                        <h3 className="text-3xl font-bold text-slate-800">{summary.total}</h3>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center text-slate-400">
                                        <Icons.Task />
                                    </div>
                                </div>

                                {budgetCol ? (
                                    <div className="bg-white rounded-xl p-5 shadow-sm border border-slate-100 flex items-center justify-between">
                                        <div className="overflow-hidden">
                                            <p className="text-sm font-medium text-slate-500 mb-1">มูลค่างบประมาณรวม</p>
                                            <h3 className="text-2xl font-bold text-indigo-700 truncate" title={formatCurrency(summary.totalBudget)}>
                                                ฿{formatCurrency(summary.totalBudget).split('.')[0]}
                                            </h3>
                                        </div>
                                        <div className="w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-500 shrink-0 ml-2">
                                            <Icons.Money />
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-slate-50 rounded-xl p-5 border border-slate-200 border-dashed flex items-center justify-center text-slate-400 text-sm">
                                        ไม่พบคอลัมน์วงเงิน
                                    </div>
                                )}

                                <div className="bg-white rounded-xl p-5 shadow-sm border border-slate-100 flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium text-slate-500 mb-1">ดำเนินการเสร็จ/ลงนามแล้ว</p>
                                        <h3 className="text-3xl font-bold text-emerald-600">{summary.completed}</h3>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-500">
                                        <Icons.Check />
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl p-5 shadow-sm border border-slate-100 flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium text-slate-500 mb-1">สถานะล่าช้า/รอแก้ไข</p>
                                        <h3 className="text-3xl font-bold text-rose-600">{summary.delayed}</h3>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-rose-50 flex items-center justify-center text-rose-500">
                                        <Icons.Alert />
                                    </div>
                                </div>
                            </div>

                            {/* Charts Section */}
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                                {/* Status Pie Chart */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                    <h3 className="text-base font-semibold text-slate-800 mb-4">สัดส่วนสถานะงาน</h3>
                                    <div className="h-64">
                                        {statusChartData.length > 0 ? (
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie
                                                        data={statusChartData}
                                                        cx="50%"
                                                        cy="50%"
                                                        innerRadius={60}
                                                        outerRadius={90}
                                                        paddingAngle={2}
                                                        dataKey="value"
                                                    >
                                                        {statusChartData.map((entry, index) => (
                                                            <Cell key={`cell-${index}`} fill={entry.color} />
                                                        ))}
                                                    </Pie>
                                                    <Tooltip contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                                                    <Legend verticalAlign="bottom" height={36} iconType="circle" />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        ) : (
                                            <div className="h-full flex items-center justify-center text-slate-400">ไม่มีข้อมูลสถานะ</div>
                                        )}
                                    </div>
                                </div>

                                {/* Budget Bar Chart */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                    <h3 className="text-base font-semibold text-slate-800 mb-4">งบประมาณสูงสุดตามหน่วยงาน (Top 5)</h3>
                                    <div className="h-64">
                                        {deptChartData.length > 0 ? (
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={deptChartData} layout="vertical" margin={{ top: 5, right: 30, left: 40, bottom: 5 }}>
                                                    <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} stroke="#f1f5f9" />
                                                    <XAxis type="number" tickFormatter={(val) => `฿${(val/1000000).toFixed(1)}M`} tick={{ fill: '#64748b', fontSize: 12 }} axisLine={false} tickLine={false} />
                                                    <YAxis dataKey="name" type="category" tick={{ fill: '#475569', fontSize: 12 }} axisLine={false} tickLine={false} />
                                                    <Tooltip 
                                                        formatter={(value) => [`฿${formatCurrency(value)}`, 'งบประมาณ']}
                                                        contentStyle={{ borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} 
                                                    />
                                                    <Bar dataKey="value" fill="#6366f1" radius={[0, 4, 4, 0]} barSize={24} />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        ) : (
                                            <div className="h-full flex items-center justify-center text-slate-400">ไม่มีข้อมูลงบประมาณหรือหน่วยงาน</div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Data Table */}
                            <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                                <div className="p-4 md:p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/50">
                                    <h3 className="text-lg font-semibold text-slate-800">
                                        รายการจัดซื้อจัดจ้าง <span className="text-sm font-normal text-slate-500">({sheets.find(s => s.id === selectedSheet)?.name})</span>
                                    </h3>
                                    
                                    <div className="relative w-full md:w-80">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                            <Icons.Search />
                                        </div>
                                        <input
                                            type="text"
                                            placeholder="ค้นหารายการ, สถานะ, หรือหน่วยงาน..."
                                            className="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                        />
                                    </div>
                                </div>

                                <div className="overflow-x-auto custom-scrollbar">
                                    <table className="w-full text-sm text-left">
                                        <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200 sticky top-0 z-10">
                                            <tr>
                                                {/* จัดลำดับคอลัมน์สำคัญให้แสดงก่อน */}
                                                {statusCol && <th className="px-6 py-4 font-semibold whitespace-nowrap min-w-[180px]">สถานะ</th>}
                                                {itemCol && <th className="px-6 py-4 font-semibold min-w-[300px]">รายการ</th>}
                                                {deptCol && <th className="px-6 py-4 font-semibold whitespace-nowrap">หน่วยงาน</th>}
                                                {budgetCol && <th className="px-6 py-4 font-semibold whitespace-nowrap text-right">วงเงินดำเนินการ</th>}
                                                {endDateCol && <th className="px-6 py-4 font-semibold whitespace-nowrap">สิ้นสุดสัญญา</th>}
                                                
                                                {/* คอลัมน์อื่นๆ ที่เหลือ */}
                                                {headers.filter(h => h !== statusCol && h !== itemCol && h !== deptCol && h !== budgetCol && h !== endDateCol).map((header, idx) => (
                                                    <th key={idx} className="px-6 py-4 font-semibold whitespace-nowrap">
                                                        {header}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredData.length > 0 ? filteredData.map((row, rowIndex) => {
                                                // วิเคราะห์สีพื้นหลังและ Badge
                                                let statusStr = statusCol ? String(row[statusCol] || '') : '';
                                                let isDone = statusStr.includes('เสร็จ') || statusStr.includes('Complete') || statusStr.includes('ลงนามสัญญาแล้ว');
                                                let isDelay = statusStr.includes('ล่าช้า') || statusStr.includes('ปัญหา') || statusStr.includes('ยกเลิก');
                                                
                                                let bgClass = "bg-white";
                                                if (isDone) bgClass = "bg-emerald-50/20";
                                                else if (isDelay) bgClass = "bg-rose-50/30";

                                                // จัดเรียงข้อมูลให้ตรงกับหัวตารางใหม่
                                                const orderedCells = [
                                                    statusCol && { key: statusCol, val: row[statusCol] },
                                                    itemCol && { key: itemCol, val: row[itemCol] },
                                                    deptCol && { key: deptCol, val: row[deptCol] },
                                                    budgetCol && { key: budgetCol, val: row[budgetCol] },
                                                    endDateCol && { key: endDateCol, val: row[endDateCol] },
                                                    ...headers.filter(h => h !== statusCol && h !== itemCol && h !== deptCol && h !== budgetCol && h !== endDateCol).map(h => ({ key: h, val: row[h] }))
                                                ].filter(Boolean);

                                                return (
                                                    <tr key={rowIndex} className={`table-row-enter hover:bg-slate-50/80 ${bgClass}`}>
                                                        {orderedCells.map((cell, colIndex) => {
                                                            // คอลัมน์สถานะ (ใส่ Badge)
                                                            if (cell.key === statusCol) {
                                                                const badgeColor = isDone ? 'bg-emerald-100 text-emerald-700 border-emerald-200' 
                                                                                : isDelay ? 'bg-rose-100 text-rose-700 border-rose-200' 
                                                                                : 'bg-blue-100 text-blue-700 border-blue-200';
                                                                return (
                                                                    <td key={colIndex} className="px-6 py-4 whitespace-nowrap">
                                                                        <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium border ${badgeColor}`}>
                                                                            {cell.val || '-'}
                                                                        </span>
                                                                    </td>
                                                                );
                                                            }
                                                            
                                                            // คอลัมน์งบประมาณ (จัดขวา + Format)
                                                            if (cell.key === budgetCol) {
                                                                const num = parseNumber(cell.val);
                                                                return (
                                                                    <td key={colIndex} className="px-6 py-4 whitespace-nowrap text-right font-medium text-slate-700">
                                                                        {num > 0 ? formatCurrency(num) : (cell.val || '-')}
                                                                    </td>
                                                                );
                                                            }

                                                            // คอลัมน์รายการ (จำกัดความกว้างให้ดูสวยงาม)
                                                            if (cell.key === itemCol) {
                                                                return (
                                                                    <td key={colIndex} className="px-6 py-4 text-slate-700">
                                                                        <div className="line-clamp-2" title={cell.val}>{cell.val || '-'}</div>
                                                                    </td>
                                                                );
                                                            }

                                                            // คอลัมน์ทั่วไป
                                                            return (
                                                                <td key={colIndex} className="px-6 py-4 text-slate-600 whitespace-nowrap max-w-[200px] truncate" title={cell.val}>
                                                                    {cell.val || '-'}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                );
                                            }) : (
                                                <tr>
                                                    <td colSpan={headers.length} className="px-6 py-12 text-center text-slate-500">
                                                        ไม่พบข้อมูล (หากตารางว่างเปล่า โปรดตรวจสอบคำค้นหา)
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </>
                    )}
                    
                    <footer className="mt-8 mb-4 text-center text-xs text-slate-400">
                        Dashboard สร้างและดึงข้อมูลจาก Google Sheet โดยตรง
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
