<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามสถานะงาน MWA</title>
    <!-- โหลด React และ Babel เวอร์ชันที่เสถียร -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js" crossorigin></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                    },
                    colors: {
                        mwa: {
                            light: '#e0f2fe',
                            DEFAULT: '#0284c7',
                            dark: '#0369a1',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- เพิ่ม data-type="module" เพื่อแก้ปัญหา Cannot use import statement outside a module -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;

        // ไอคอน (ใช้ SVG inline)
        const Icons = {
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Filter: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        };

        const App = () => {
            const [datasets, setDatasets] = useState({
                'งบทำการ-2569': [],
                'งบลงทุน-2569': [],
                'งบทำการ-2570': [],
                'งบลงทุน-2570': []
            });
            const [activeTab, setActiveTab] = useState('งบทำการ-2569');
            const [searchTerm, setSearchTerm] = useState('');
            const [statusFilter, setStatusFilter] = useState('ทั้งหมด');
            const [selectedItem, setSelectedItem] = useState(null);
            const [isLoading, setIsLoading] = useState(false);

            // ไอดีของ Google Sheet จากลิงก์ที่ให้มา
            const SHEET_ID = '1JJT9T9OsSSpzzT3HlwgTbBkKzmmqSFRTcLw--fHrT_o';

            // ดึงข้อมูลอัตโนมัติเมื่อเข้ามาครั้งแรก หรือเปลี่ยน Tab
            useEffect(() => {
                if (datasets[activeTab].length === 0) {
                    fetchDataFromSheet(activeTab);
                }
            }, [activeTab]);

            // ฟังก์ชันดูดข้อมูลจาก Google Sheet อัตโนมัติ
            const fetchDataFromSheet = (tabName) => {
                setIsLoading(true);
                // ใช้ Gviz API ของ Google ในการแปลง Sheet เป็น CSV ตามชื่อ Tab
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;

                Papa.parse(url, {
                    download: true,
                    complete: (results) => {
                        processData(results.data, tabName);
                        setIsLoading(false);
                    },
                    error: (error) => {
                        console.error("Error fetching data:", error);
                        alert('ดึงข้อมูลไม่ได้ครับ ลองตรวจสอบว่าเปิดสิทธิ์การเข้าถึงไฟล์ให้เป็น "ทุกคนที่มีลิงก์" หรือยังนะครับ');
                        setIsLoading(false);
                    }
                });
            };

            // ฟังก์ชันสำหรับจัดการไฟล์ CSV ที่อัปโหลด (เก็บไว้เป็นแผนสำรอง)
            const handleFileUpload = (event, tabName) => {
                const file = event.target.files[0];
                if (!file) return;

                Papa.parse(file, {
                    complete: (results) => {
                        processData(results.data, tabName);
                    },
                    header: false, // ปิด header ไปก่อน เพราะแถวแรกๆ อาจเป็นชื่อรายงาน
                    skipEmptyLines: true
                });
            };

            // ฟังก์ชันจัดการข้อมูล (ลบแถวหัวรายงานออก และตั้ง header ใหม่)
            const processData = (rawData, tabName) => {
                // หาบรรทัดที่เป็น Header จริงๆ (มีคำว่า 'สถานะ')
                const headerIndex = rawData.findIndex(row => row.includes('สถานะ'));
                
                if (headerIndex === -1) {
                    alert('ไม่พบโครงสร้างข้อมูลที่ถูกต้อง (ไม่มีคอลัมน์ "สถานะ")');
                    return;
                }

                const headers = rawData[headerIndex];
                const rows = rawData.slice(headerIndex + 1);

                // แปลงเป็น Array of Objects
                const formattedData = rows.map(row => {
                    let obj = {};
                    headers.forEach((header, index) => {
                        if (header && header.trim() !== '') {
                            // จัดการชื่อคอลัมน์ที่มีขึ้นบรรทัดใหม่
                            const cleanHeader = header.replace(/\n/g, ' ').trim();
                            obj[cleanHeader] = row[index];
                        }
                    });
                    return obj;
                }).filter(item => item['สถานะ'] && item['รายการ']); // กรองเฉพาะแถวที่มีข้อมูล

                setDatasets(prev => ({
                    ...prev,
                    [tabName]: formattedData
                }));
            };

            // ข้อมูลที่กำลังแสดงอยู่ตาม Tab ที่เลือก
            const currentData = datasets[activeTab] || [];

            // รายการสถานะทั้งหมดสำหรับ Filter
            const allStatuses = useMemo(() => {
                const statuses = new Set(currentData.map(item => item['สถานะ']).filter(Boolean));
                return ['ทั้งหมด', ...Array.from(statuses)];
            }, [currentData]);

            // กรองข้อมูลตามการค้นหาและสถานะ
            const filteredData = useMemo(() => {
                return currentData.filter(item => {
                    const matchSearch = Object.values(item).some(val => 
                        val && val.toString().toLowerCase().includes(searchTerm.toLowerCase())
                    );
                    const matchStatus = statusFilter === 'ทั้งหมด' || item['สถานะ'] === statusFilter;
                    return matchSearch && matchStatus;
                });
            }, [currentData, searchTerm, statusFilter]);

            // คำนวณสรุป (KPIs)
            const summary = useMemo(() => {
                const total = filteredData.length;
                let totalBudget = 0;
                let inProgress = 0;

                filteredData.forEach(item => {
                    // ดึงค่าตัวเลขจากคอลัมน์ "วงเงินดำเนินการ (รวม VAT)"
                    const budgetStr = item['วงเงินดำเนินการ (รวม VAT)'] || item['วงเงินดำเนินการ'] || '0';
                    const budgetNum = parseFloat(budgetStr.toString().replace(/,/g, ''));
                    if (!isNaN(budgetNum)) totalBudget += budgetNum;

                    if (item['สถานะ'] && item['สถานะ'].includes('อยู่ระหว่าง')) inProgress++;
                });

                return {
                    total,
                    totalBudget: totalBudget.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
                    inProgress
                };
            }, [filteredData]);

            // Format วันที่ให้ดูง่าย
            const formatDate = (dateStr) => {
                if (!dateStr || dateStr.includes('1900')) return '-';
                // ถ้าเป็นรูปแบบ YYYY-MM-DD
                if (dateStr.includes('-')) {
                    const [year, month, day] = dateStr.split('-');
                    return `${day}/${month}/${year}`;
                }
                return dateStr;
            };

            const getStatusColor = (status) => {
                if (!status) return 'bg-gray-100 text-gray-800';
                if (status.includes('เสร็จ')) return 'bg-green-100 text-green-800';
                if (status.includes('อยู่ระหว่าง')) return 'bg-blue-100 text-blue-800';
                if (status.includes('รอ')) return 'bg-yellow-100 text-yellow-800';
                if (status.includes('ยกเลิก')) return 'bg-red-100 text-red-800';
                return 'bg-gray-100 text-gray-800';
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar / Navigation */}
                    <aside className="w-full md:w-64 bg-white border-r border-gray-200 p-6 flex flex-col">
                        <div className="flex items-center gap-3 mb-8">
                            <div className="bg-mwa text-white p-2 rounded-lg">
                                <Icons.FileText />
                            </div>
                            <div>
                                <h1 className="font-bold text-gray-800 leading-tight">MWA Tracking</h1>
                                <p className="text-xs text-gray-500">ฝ่ายโรงงานผลิตน้ำมหาสวัสดิ์</p>
                            </div>
                        </div>

                        <nav className="flex-1 space-y-2">
                            <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">แหล่งข้อมูล / ปีงบประมาณ</p>
                            {Object.keys(datasets).map(tab => (
                                <button
                                    key={tab}
                                    onClick={() => { setActiveTab(tab); setStatusFilter('ทั้งหมด'); }}
                                    className={`w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all duration-200 ${
                                        activeTab === tab 
                                        ? 'bg-mwa text-white shadow-md' 
                                        : 'text-gray-600 hover:bg-gray-100'
                                    }`}
                                >
                                    <span className="font-medium">{tab.replace('-', ' ')}</span>
                                    {datasets[tab].length > 0 && (
                                        <span className={`text-xs px-2 py-1 rounded-full ${activeTab === tab ? 'bg-white/20' : 'bg-gray-200'}`}>
                                            {datasets[tab].length}
                                        </span>
                                    )}
                                </button>
                            ))}
                        </nav>

                        {/* Control Section */}
                        <div className="mt-8 pt-6 border-t border-gray-200">
                            <button 
                                onClick={() => fetchDataFromSheet(activeTab)}
                                disabled={isLoading}
                                className="w-full mb-4 flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white py-2.5 px-4 rounded-xl transition-colors disabled:opacity-50 text-sm font-medium shadow-sm"
                            >
                                {isLoading ? (
                                    <div className="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
                                ) : (
                                    <Icons.Upload /> // ใช้ไอคอนแทนการโหลด
                                )}
                                {isLoading ? 'กำลังซิงค์ข้อมูล...' : 'ซิงค์ Google Sheet'}
                            </button>

                            <p className="text-xs text-gray-500 mb-3 text-center">หรืออัปโหลดไฟล์ CSV แบบแมนนวล</p>
                            <label className="flex flex-col items-center justify-center w-full h-20 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors">
                                <div className="flex flex-col items-center justify-center text-gray-400">
                                    <p className="text-xs font-medium">คลิกอัปโหลด {activeTab}</p>
                                </div>
                                <input type="file" accept=".csv" className="hidden" onChange={(e) => handleFileUpload(e, activeTab)} />
                            </label>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-6 lg:p-10 h-screen overflow-y-auto custom-scrollbar">
                        
                        {/* Header & KPI */}
                        <div className="mb-8">
                            <h2 className="text-2xl font-bold text-gray-800 mb-6">ภาพรวม {activeTab.replace('-', ' ปี ')}</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm flex items-center gap-4">
                                    <div className="bg-blue-50 p-4 rounded-full text-mwa"><Icons.FileText /></div>
                                    <div>
                                        <p className="text-sm text-gray-500 font-medium">จำนวนงานทั้งหมด</p>
                                        <p className="text-3xl font-bold text-gray-800">{summary.total}</p>
                                    </div>
                                </div>
                                <div className="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm flex items-center gap-4">
                                    <div className="bg-green-50 p-4 rounded-full text-green-600">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                                    </div>
                                    <div>
                                        <p className="text-sm text-gray-500 font-medium">มูลค่ารวม (บาท)</p>
                                        <p className="text-2xl font-bold text-gray-800">{summary.totalBudget}</p>
                                    </div>
                                </div>
                                <div className="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm flex items-center gap-4">
                                    <div className="bg-yellow-50 p-4 rounded-full text-yellow-600">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                    </div>
                                    <div>
                                        <p className="text-sm text-gray-500 font-medium">อยู่ระหว่างดำเนินงาน</p>
                                        <p className="text-3xl font-bold text-gray-800">{summary.inProgress}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Table Controls */}
                        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm flex flex-col h-[calc(100vh-280px)]">
                            <div className="p-4 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                                <div className="relative w-full sm:w-96">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                        <Icons.Search />
                                    </div>
                                    <input
                                        type="text"
                                        placeholder="ค้นหารายการ, หน่วยงาน..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-mwa/50 focus:border-mwa transition-all text-sm"
                                    />
                                </div>
                                
                                <div className="flex items-center gap-2 w-full sm:w-auto">
                                    <Icons.Filter />
                                    <select 
                                        value={statusFilter}
                                        onChange={(e) => setStatusFilter(e.target.value)}
                                        className="w-full sm:w-auto border border-gray-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-mwa/50"
                                    >
                                        {allStatuses.map(status => (
                                            <option key={status} value={status}>{status}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            {/* Data Table */}
                            <div className="flex-1 overflow-auto custom-scrollbar">
                                {isLoading ? (
                                    <div className="h-full flex flex-col items-center justify-center text-gray-400 p-8 text-center">
                                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-mwa mb-4"></div>
                                        <p className="text-lg font-medium text-gray-600">กำลังดูดข้อมูลจาก Sheet...</p>
                                        <p className="text-sm mt-2 max-w-md">รอสักครู่นะครับ</p>
                                    </div>
                                ) : currentData.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-gray-400 p-8 text-center">
                                        <div className="bg-gray-50 p-6 rounded-full mb-4"><Icons.FileText /></div>
                                        <p className="text-lg font-medium text-gray-600">ไม่พบข้อมูล หรือโหลดข้อมูลล้มเหลว</p>
                                        <p className="text-sm mt-2 max-w-md">ลองกดปุ่ม "ซิงค์ Google Sheet" อีกครั้ง หรือตรวจสอบสิทธิ์ของไฟล์</p>
                                    </div>
                                ) : (
                                    <table className="w-full text-sm text-left whitespace-nowrap">
                                        <thead className="text-xs text-gray-500 uppercase bg-gray-50 sticky top-0 z-10">
                                            <tr>
                                                <th className="px-6 py-4 font-medium tracking-wider">ลำดับ</th>
                                                <th className="px-6 py-4 font-medium tracking-wider">สถานะ</th>
                                                <th className="px-6 py-4 font-medium tracking-wider">วันที่อัปเดต</th>
                                                <th className="px-6 py-4 font-medium tracking-wider">หน่วยงาน</th>
                                                <th className="px-6 py-4 font-medium tracking-wider w-full min-w-[300px]">รายการ</th>
                                                <th className="px-6 py-4 font-medium tracking-wider text-right">วงเงิน (รวม VAT)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {filteredData.map((item, idx) => (
                                                <tr 
                                                    key={idx} 
                                                    onClick={() => setSelectedItem(item)}
                                                    className="hover:bg-blue-50/50 cursor-pointer transition-colors"
                                                >
                                                    <td className="px-6 py-4 text-gray-500">{item['ลำดับที่'] || '-'}</td>
                                                    <td className="px-6 py-4">
                                                        <span className={`px-3 py-1 rounded-full text-xs font-medium ${getStatusColor(item['สถานะ'])}`}>
                                                            {item['สถานะ'] || '-'}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4 text-gray-600">{formatDate(item['วันที่'])}</td>
                                                    <td className="px-6 py-4 font-medium text-gray-700">{item['หน่วยงาน'] || '-'}</td>
                                                    <td className="px-6 py-4 text-gray-800 truncate max-w-md whitespace-normal">
                                                        <p className="line-clamp-2">{item['รายการ']}</p>
                                                    </td>
                                                    <td className="px-6 py-4 text-right font-medium text-gray-700">
                                                        {item['วงเงินดำเนินการ (รวม VAT)'] 
                                                            ? Number(item['วงเงินดำเนินการ (รวม VAT)'].toString().replace(/,/g,'')).toLocaleString('th-TH') 
                                                            : '-'}
                                                    </td>
                                                </tr>
                                            ))}
                                            {filteredData.length === 0 && (
                                                <tr>
                                                    <td colSpan="6" className="px-6 py-8 text-center text-gray-500">
                                                        ไม่พบข้อมูลที่ค้นหา
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Modal ดูรายละเอียด */}
                    {selectedItem && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl animate-[fadeIn_0.2s_ease-out]">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-start">
                                    <div>
                                        <span className={`px-3 py-1 rounded-full text-xs font-medium mb-3 inline-block ${getStatusColor(selectedItem['สถานะ'])}`}>
                                            {selectedItem['สถานะ']}
                                        </span>
                                        <h3 className="text-xl font-bold text-gray-800 leading-tight">{selectedItem['รายการ']}</h3>
                                        <p className="text-sm text-gray-500 mt-2">อัปเดตล่าสุด: {formatDate(selectedItem['วันที่'])} | ลำดับที่: {selectedItem['ลำดับที่']}</p>
                                    </div>
                                    <button 
                                        onClick={() => setSelectedItem(null)}
                                        className="p-2 text-gray-400 hover:text-gray-800 hover:bg-gray-100 rounded-full transition-colors"
                                    >
                                        <Icons.X />
                                    </button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                                        {Object.entries(selectedItem).map(([key, value]) => {
                                            // ซ่อนฟิลด์ว่างๆ หรือฟิลด์ที่เราแสดงไปแล้วข้างบน
                                            if (!value || value.trim() === '' || value.includes('1900') || ['รายการ', 'สถานะ'].includes(key)) return null;
                                            
                                            // Format เงินถ้าชื่อคอลัมน์มีคำว่า วงเงิน
                                            let displayValue = value;
                                            if (key.includes('วงเงิน') && !isNaN(value.replace(/,/g, ''))) {
                                                displayValue = Number(value.replace(/,/g, '')).toLocaleString('th-TH') + ' บาท';
                                            } else if (key.includes('วันที่') || key.includes('สิ้นสุด')) {
                                                displayValue = formatDate(value);
                                            }

                                            return (
                                                <div key={key} className="border-b border-gray-50 pb-2">
                                                    <p className="text-xs text-gray-400 font-medium mb-1">{key}</p>
                                                    <p className="text-sm text-gray-800 font-medium whitespace-pre-wrap">{displayValue}</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
