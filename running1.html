  <title>Running Calculator — All-in-One</title>
<style>
  :root{
    --bg:#f4f7fb; 
    --card:#ffffff; 
    --text:#233041; 
    --muted:#6b7a90; 
    --primary:#0d6efd; 
    --primary-700:#0b5ed7; 
    --ring: rgba(13,110,253,.25);
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    color:var(--text)
  }

  /* Header เตี้ยลง */
  header{
    position:sticky; top:0; z-index:10;
    background:var(--card);
    border-bottom:1px solid #e6eef8;
  }
  .wrap{
    max-width:1000px; margin:0 auto;
    padding:6px 12px;                   /* เดิม 10px 16px → ลดลง */
    display:flex; gap:6px; align-items:center; flex-wrap:wrap;
  }
  h1{
    font-size:14px;                     /* เดิม 18px → ลดลง */
    margin:0; white-space:nowrap;
  }

  /* ปุ่มเมนูแบบกระชับ */
  .tabs{ display:flex; gap:6px; flex:1; flex-wrap:wrap }
  .tab-btn{
    appearance:none; cursor:pointer; transition:.2s;
    border:1px solid #d6e2f3; background:#fff;
    padding:6px 10px;                   /* เดิม 10px 14px → ลดลง */
    border-radius:999px; font-weight:600; font-size:14px; /* เดิม ~16px */
    text-align:center;
    flex:1 1 140px;                     /* เดิม 160px → ลดลง */
  }
  .tab-btn[aria-selected="true"]{
    background:var(--primary); color:#fff; border-color:var(--primary);
  }
  .tab-btn:focus-visible{ outline:3px solid var(--ring) }

  /* ซ่อนคำอธิบายเพื่อประหยัดพื้นที่ */
  .note{ display:none; }

  /* พื้นที่แสดงผลสูงขึ้นตาม header ที่เตี้ยลง */
  .view{ height:calc(100vh - 48px) }    /* เดิม 68px → 48px */

  iframe{
    display:none; border:0; width:100%; height:100%;
    background:#fff; border-radius:0;
  }
  iframe.active{ display:block }

  /* ให้ปุ่มมีขนาดคงที่บนจอใหญ่ */
  @media (min-width: 900px) {
    .tab-btn{ flex:0 0 auto; min-width:140px } /* เดิม 160px → 140px */
  }

  /* โหมดจอเล็กมาก: ลดระยะห่างเพิ่มอีกนิด */
  @media (max-width: 360px) {
    .wrap{ padding:4px 8px; gap:4px }
    .tabs{ gap:4px }
    .tab-btn{ padding:5px 8px; font-size:13px; min-width:120px }
    .view{ height:calc(100vh - 42px) }
  }
</style>

</head>

  </style></head><body>  <div class=&quot;container&quot;>    <h1&gt;Race Predict Calculator</h1>    <form id=&quot;raceForm&quot; onsubmit=&quot;event.preventDefault(); calculateRacePredict();&quot;>      
      <!-- 1. ผลการแข่งขันที่เคยทำได้ -->      <div class=&quot;form-group&quot;>        <label for=&quot;achievedDistance&quot;&gt;ผลการแข่งขันที่เคยทำได้ (ระยะทาง กม.)</label>        <input type=&quot;number&quot; id=&quot;achievedDistance&quot; name=&quot;achievedDistance&quot; step=&quot;any&quot; placeholder=&quot;เช่น 5 - 42.195&quot; required>      </div>      <div class=&quot;form-group&quot;>        <label&gt;เวลา (ที่ทำได้) <small&gt;(ชั่วโมง, นาที, วินาที)</small&gt;</label>        <div class=&quot;inline-inputs&quot;>          <input type=&quot;number&quot; id=&quot;achievedHours&quot; name=&quot;achievedHours&quot; min=&quot;0&quot; placeholder=&quot;ชั่วโมง&quot; value=&quot;0&quot;>          <span&gt;:</span>          <input type=&quot;number&quot; id=&quot;achievedMinutes&quot; name=&quot;achievedMinutes&quot; min=&quot;0&quot; max=&quot;59&quot; placeholder=&quot;นาที&quot; value=&quot;0&quot;>          <span&gt;:</span>          <input type=&quot;number&quot; id=&quot;achievedSeconds&quot; name=&quot;achievedSeconds&quot; min=&quot;0&quot; max=&quot;59&quot; placeholder=&quot;วินาที&quot; value=&quot;0&quot;>        </div>      </div>

    <!-- แสดงผลลัพธ์สำหรับข้อมูล Input -->    <div id=&quot;result&quot;&gt;</div>    
    <!-- แสดงผลลัพธ์สำหรับระยะมาตรฐานและ % Pace -->    <div id=&quot;standardResults&quot;&gt;</div>  </div>
  <script>    // ฟังก์ชันช่วยแปลงเวลา (วินาที) เป็น &quot;ชั่วโมง นาที วินาที&quot;
    function formatTime(totalSeconds) {
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      let timeString = &quot;&quot;;
      if (hours &gt; 0) { timeString += hours + &quot; ชั่วโมง &quot;; }
      if (minutes &gt; 0 || hours &gt; 0) { timeString += minutes + &quot; นาที &quot;; }
      timeString += seconds + &quot; วินาที&quot;;
      return timeString;
    }

    // แปลง pace (นาที/กม.) ให้อยู่ในรูปแบบ &quot;m:ss&quot;
    function formatPace(pace) {
  const totalSeconds = Math.round(pace * 60);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  const secondsStr = seconds < 10 ? &quot;0&quot; + seconds : seconds;
  return minutes + &quot;:&quot; + secondsStr;
}


    // ฟังก์ชันคำนวณเวลาที่คาดว่าจะใช้ในการวิ่งสำหรับระยะทางที่กำหนด โดยใช้ LT Pace (ltTotalSec: วินาที/กม.)
    function computeRaceTime(targetDistance, ltTotalSec) {
      const segments = [
        { duration: 2, percent: 118 },
        { duration: 6 , percent: 110 },
        { duration: 26, percent: 100 },
        { duration: 120, percent: 92 },
        { duration: 120, percent: 80 },
        { duration: 120, percent: 60 }
      ];
      let totalTimeMinutes = 0;
      let remainingDistance = targetDistance;

      function adjustedPace(percent) {
        return (ltTotalSec * (100 / percent)) / 60; // pace in นาที/กม.
      }
      
      for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];
        const pace = adjustedPace(seg.percent);
        const segDistance = seg.duration / pace;
        if (segDistance < remainingDistance) {
          totalTimeMinutes += seg.duration;
          remainingDistance -= segDistance;
        } else {
          totalTimeMinutes += remainingDistance * pace;
          remainingDistance = 0;
          break;
        }
      }
      // ถ้ายังมีระยะทางเหลือ ให้วิ่งส่วนที่เหลือด้วยความเร็วที่ปรับที่ 50%
      if (remainingDistance &gt; 0) {
        const pace50 = adjustedPace(50);
        totalTimeMinutes += remainingDistance * pace50;
      }
      return totalTimeMinutes;
    }

    // ฟังก์ชันหา LT Pace (ltTotalSec) จากผลการแข่งขันที่ทำได้ (โดยใช้ binary search)
    function findLTPace(achievedDistance, achievedTimeMinutes) {
      let low = 120;  
      let high = 600; 
      let mid;
      for (let i = 0; i < 30; i++) {
        mid = (low + high) / 2;
        const computedTime = computeRaceTime(achievedDistance, mid);
        if (computedTime &gt; achievedTimeMinutes) {
          high = mid;
        } else {
          low = mid;
        }
      }
      return mid;
    }

    function calculateRacePredict() {
      const achievedDistance = parseFloat(document.getElementById(&quot;achievedDistance&quot;).value);
      let achievedHours = parseInt(document.getElementById(&quot;achievedHours&quot;).value, 10);
      let achievedMinutes = parseInt(document.getElementById(&quot;achievedMinutes&quot;).value, 10);
      let achievedSeconds = parseInt(document.getElementById(&quot;achievedSeconds&quot;).value, 10);
      
      achievedHours = isNaN(achievedHours) ? 0 : achievedHours;
      achievedMinutes = isNaN(achievedMinutes) ? 0 : achievedMinutes;
      achievedSeconds = isNaN(achievedSeconds) ? 0 : achievedSeconds;
      
      const forecastDistance = parseFloat(document.getElementById(&quot;distance&quot;).value);

      if (isNaN(achievedDistance) || isNaN(forecastDistance)) {
        document.getElementById(&quot;result&quot;).innerHTML = &quot;<p style=&#x27;color:red;&#x27;&gt;กรุณากรอกข้อมูลให้ครบถ้วน</p&gt;&quot;;
        return;
      }
      
      // คำนวณเวลาที่ทำได้ทั้งหมด (นาที)
      const totalAchievedTimeMinutes = achievedHours * 60 + achievedMinutes + achievedSeconds / 60;
      // คำนวณ pace จากผลการแข่งขันที่ทำได้ (นาที/กม.)
      const inputPace = totalAchievedTimeMinutes / achievedDistance;
      
      // คำนวณ LT Pace (วินาที/กม.)
      const ltTotalSec = findLTPace(achievedDistance, totalAchievedTimeMinutes);
      const ltPaceInMinutes = ltTotalSec / 60;
      const ltPaceStr = formatPace(ltPaceInMinutes);

      // คำนวณผลลัพธ์สำหรับระยะทางคาดการณ์
      const forecastTimeMinutes = computeRaceTime(forecastDistance, ltTotalSec);
      const forecastTimeSec = Math.round(forecastTimeMinutes * 60);
      const forecastTimeStr = formatTime(forecastTimeSec);
      const avgPaceForecast = forecastTimeMinutes / forecastDistance;
      const avgPaceForecastStr = formatPace(avgPaceForecast);
      
      let resultHTML = `<p&gt;<strong&gt;Pace จากผลการแข่งขันที่ทำได้:</strong&gt; ${formatPace(inputPace)} นาที/กม.</p&gt;`;
      resultHTML += `<p&gt;<strong&gt;LT Pace ที่คำนวณได้:</strong&gt; ${ltPaceStr} นาที/กม.</p&gt;`;
      resultHTML += `<p&gt;<strong&gt;สำหรับระยะทาง ${forecastDistance} กม. คาดว่าจะใช้เวลา:</strong&gt; ${forecastTimeStr} <br&gt;(Pace เฉลี่ย: ${avgPaceForecastStr} นาที/กม.)</p&gt;`;
      document.getElementById(&quot;result&quot;).innerHTML = resultHTML;
      
      // ผลลัพธ์สำหรับระยะมาตรฐาน
      const standardDistances = [
        { label: &quot;5K&quot;, distance: 5 },
        { label: &quot;5M&quot;, distance: 8.04672 },
        { label: &quot;10K&quot;, distance: 10 },
        { label: &quot;10M&quot;, distance: 16.09344 },
        { label: &quot;Half Marathon&quot;, distance: 21.0975 },
        { label: &quot;33K&quot;, distance: 33 },
        { label: &quot;Marathon&quot;, distance: 42.195 }
      ];
      
      let standardHTML = &quot;<h3&gt;ผลลัพธ์สำหรับระยะมาตรฐาน:</h3&gt;<ul class=&#x27;standard-list&#x27;&gt;&quot;;
      standardDistances.forEach(function(item) {
        const timeMin = computeRaceTime(item.distance, ltTotalSec);
        const timeSec = Math.round(timeMin * 60);
        const timeStr = formatTime(timeSec);
        const avgPaceForStandard = timeMin / item.distance;
        const avgPaceForStandardStr = formatPace(avgPaceForStandard);
        standardHTML += `<li&gt;${item.label} (${item.distance} กม.): ${timeStr} <span class=&quot;badge&quot;&gt;(${avgPaceForStandardStr} นาที/กม.)</span&gt;</li&gt;`;
      });

  <script>    // แปลง pace (นาที/กม.) ให้อยู่ในรูปแบบ &quot;m:ss&quot;
    function formatPace(pace) {
      const totalSeconds = Math.round(pace * 60);

        const paceAtHighPercent = (ltTotalSec * (100 / highPercent)) / 60;
        const paceAtLowPercent = (ltTotalSec * (100 / lowPercent)) / 60;

    function computeRaceTime(targetDistance, ltTotalSec) {
      const segments = [
        { duration: 2, percent: 118 },
        { duration: 6 , percent: 110 },
        { duration: 26, percent: 100 },
        { duration: 120, percent: 92 },
        { duration: 120, percent: 82 },
        { duration: 120, percent: 65 }
      ];

      let remainingDistance = targetDistance;

      function adjustedPace(percent) {
        return (ltTotalSec * (100 / percent)) / 60; // pace in นาที/กม.
      }
      
      for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];

        const segDistance = seg.duration / pace;

      padding-bottom: 0;
    }
    .result-label { color: #555; }
    .result-value { font-weight: bold; color: #333; }
    .highlight { color: #0d6efd; font-size: 1.1em; }
  </style>
</head>
<body>
  <div class=&quot;container&quot;>
    <h2>Interval Calculator</h2>

    <div class=&quot;form-group&quot;>
      <label>ระยะทางวิ่ง (เมตร)</label>
      <input type=&quot;number&quot; id=&quot;runDist&quot; placeholder=&quot;เช่น 400, 1000&quot;>
    </div>

    <div class=&quot;form-group&quot;>
      <label>ความเร็วเป้าหมาย (Pace)</label>
      <div class=&quot;row&quot;>
        <div class=&quot;col&quot;><input type=&quot;number&quot; id=&quot;paceMin&quot; placeholder=&quot;นาที&quot;></div>
        <div class=&quot;col&quot;><input type=&quot;number&quot; id=&quot;paceSec&quot; placeholder=&quot;วินาที&quot;></div>
      </div>
    </div>

    <div class=&quot;form-group&quot;>
      <label>จำนวนเที่ยว (Reps)</label>
      <input type=&quot;number&quot; id=&quot;reps&quot; placeholder=&quot;เช่น 10&quot;>
    </div>

    <div class=&quot;form-group&quot; style=&quot;background:#f8f9fa; padding:10px; border-radius:6px;&quot;>
      <label>การพัก (Rest)</label>
      <div class=&quot;row&quot; style=&quot;margin-bottom:10px;&quot;>
        <div class=&quot;col&quot;>
          <label style=&quot;font-weight:normal; font-size:12px;&quot;>เวลาพัก (วินาที)</label>
          <input type=&quot;number&quot; id=&quot;restTime&quot; placeholder=&quot;วินาที&quot;>
        </div>
      </div>
      <div class=&quot;row&quot;>
        <div class=&quot;col&quot;>
          <label style=&quot;font-weight:normal; font-size:12px;&quot;>Pace ตอนพัก (ใส่ถ้าจ็อกพัก)</label>
          <div class=&quot;row&quot;>
            <div class=&quot;col&quot;><input type=&quot;number&quot; id=&quot;restPaceMin&quot; placeholder=&quot;นาที&quot;></div>
            <div class=&quot;col&quot;><input type=&quot;number&quot; id=&quot;restPaceSec&quot; placeholder=&quot;วินาที&quot;></div>
          </div>
          <div class=&quot;note&quot;>*ถ้าไม่ใส่ Pace จะถือว่ายืนพักเฉยๆ</div>
        </div>
      </div>
    </div>

    <button onclick=&quot;calculateInterval()&quot;>คำนวณ</button>

    <div id=&quot;resultCard&quot; class=&quot;result-card&quot;>
      </div>
  </div>

  <script>
    function formatTime(totalSeconds) {
      const mins = Math.floor(totalSeconds / 60);
      const secs = Math.round(totalSeconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function calculateInterval() {
      // Get Values
      const dist = parseFloat(document.getElementById('runDist').value) || 0;
      const paceMin = parseInt(document.getElementById('paceMin').value) || 0;
      const paceSec = parseInt(document.getElementById('paceSec').value) || 0;
      const reps = parseInt(document.getElementById('reps').value) || 1;
      const restTime = parseInt(document.getElementById('restTime').value) || 0;
      const restPaceMin = parseInt(document.getElementById('restPaceMin').value) || 0;
      const restPaceSec = parseInt(document.getElementById('restPaceSec').value) || 0;

      if (dist === 0) {
        alert('กรุณากรอกระยะทางวิ่ง');
        return;
      }

      // 1. Calculate Run Time per Rep
      const totalPaceSec = (paceMin * 60) + paceSec;
      if (totalPaceSec === 0) {
        alert('กรุณากรอก Pace เป้าหมาย');
        return;
      }
      const timePerRepSec = (dist / 1000) * totalPaceSec;

      // 2. Calculate Rest
      const restPaceTotalSec = (restPaceMin * 60) + restPaceSec;
      let restDistPerRep = 0;

      if (restPaceTotalSec > 0 && restTime > 0) {
        // Active Rest: Distance = Speed * Time
        // Speed (m/s) = 1000 / PaceSec
        restDistPerRep = (1000 / restPaceTotalSec) * restTime;
      }

      // 3. Totals
      // Main Set Only
      const totalMainDist = dist * reps;
      const totalMainTimeSec = timePerRepSec * reps;

      // Total Session (Run + Rest)
      const totalSessionDist = totalMainDist + (restDistPerRep * reps);
      const totalSessionTimeSec = totalMainTimeSec + (restTime * reps);

      // Display HTML
      const card = document.getElementById('resultCard');
      card.style.display = 'block';
      card.innerHTML = `
        <div class=&quot;result-item&quot;>
          <span class=&quot;result-label&quot;>เวลาวิ่งต่อเที่ยว (${dist}m):</span>
          <span class=&quot;result-value highlight&quot;>${formatTime(timePerRepSec)} นาที</span>
        </div>
        
        <div class=&quot;result-item&quot;>
          <span class=&quot;result-label&quot;>ระยะพักต่อเที่ยว:</span>
          <span class=&quot;result-value&quot;>${restDistPerRep.toFixed(0)} m</span>
        </div>

        <div class=&quot;result-item&quot;>
          <span class=&quot;result-label&quot;>ระยะทางวิ่ง (Main Set):</span>
          <span class=&quot;result-value&quot;>${(totalMainDist/1000).toFixed(2)} km</span>
        </div>
        <div class=&quot;result-item&quot;>
          <span class=&quot;result-label&quot;>เวลาวิ่งรวม (Main Set):</span>
          <span class=&quot;result-value&quot;>${formatTime(totalMainTimeSec)} นาที</span>
        </div>
        <hr style=&quot;border:0; border-top:1px dashed #ccc; margin:10px 0;&quot;>
        <div class=&quot;result-item&quot;>
          <span class=&quot;result-label&quot;>ระยะทางรวมทั้งหมด (วิ่ง+พัก):</span>
          <span class=&quot;result-value&quot;>${(totalSessionDist/1000).toFixed(2)} km</span>
        </div>
        <div class=&quot;result-item&quot;>
          <span class=&quot;result-label&quot;>เวลารวมทั้งหมด (วิ่ง+พัก):</span>
          <span class=&quot;result-value&quot;>${formatTime(totalSessionTimeSec)} นาที</span>
        </div>
      `;
    }
  </script>
</body>
</html>
"></iframe>



    
  </main>

  <script>
    const buttons = document.querySelectorAll('.tab-btn');
    const frames = document.querySelectorAll('iframe');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        // switch active button
        buttons.forEach(b => b.setAttribute('aria-selected', 'false'));
        btn.setAttribute('aria-selected', 'true');
        // switch visible iframe
        frames.forEach(f => f.classList.remove('active'));
        const id = btn.dataset.target;
        document.getElementById(id).classList.add('active');
        // Move focus to frame for accessibility
        document.getElementById(id).focus({preventScroll:true});
      });
    });
  </script>
</body>
</html>
